name: One-time VPS setup (nginx + SSL)

on:
  workflow_dispatch:
    inputs:
      run_certbot:
        description: 'Get SSL certificate (требует DNS A-запись уже работает)'
        required: true
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy nginx config to VPS
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            deploy/nginx.conf \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/pitch-nginx.conf

      - name: Setup nginx (HTTP first, чтобы certbot мог пройти challenge)
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash <<'EOSSH'
          set -e
          DOMAIN="pitch.vezdekakdoma.ru"
          WEBROOT="/var/www/pitch-vkd"

          mkdir -p $WEBROOT
          chown -R www-data:www-data $WEBROOT
          chmod 755 $WEBROOT

          # Минимальный HTTP-only config для certbot challenge
          cat > /etc/nginx/sites-available/$DOMAIN <<'EONG'
          server {
              listen 80;
              listen [::]:80;
              server_name pitch.vezdekakdoma.ru;
              root /var/www/pitch-vkd;
              index index.html;
              location /.well-known/acme-challenge/ { allow all; }
              location / { try_files $uri $uri/ /index.html; }
              access_log /var/log/nginx/pitch-vkd-access.log;
              error_log /var/log/nginx/pitch-vkd-error.log;
          }
          EONG

          ln -sf /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
          nginx -t
          systemctl reload nginx
          echo "✓ nginx HTTP config установлен"
          EOSSH

      - name: Run certbot (если DNS уже работает)
        if: ${{ inputs.run_certbot }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash <<'EOSSH'
          set -e
          DOMAIN="pitch.vezdekakdoma.ru"

          if ! command -v certbot &>/dev/null; then
            apt-get update -qq
            apt-get install -y certbot python3-certbot-nginx
          fi

          certbot --nginx -d $DOMAIN --non-interactive --agree-tos -m r.usmanov@zbsk.ru --redirect

          # Заменяем на финальный SSL-config
          cp /tmp/pitch-nginx.conf /etc/nginx/sites-available/$DOMAIN
          nginx -t
          systemctl reload nginx
          echo "✓ HTTPS + final config установлен"
          EOSSH

      - name: Final check
        run: |
          echo "DNS resolution:"
          dig +short pitch.vezdekakdoma.ru || true
          echo ""
          echo "HTTP check (по hostname):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" -L http://pitch.vezdekakdoma.ru/ || true
          echo ""
          echo "HTTP check (по IP с Host header):"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" -H "Host: pitch.vezdekakdoma.ru" http://${{ secrets.VPS_HOST }}/ || true
