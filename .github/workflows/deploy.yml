name: Deploy pitch.vezdekakdoma.ru

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'screens/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Inject Yandex.Metrika (если задан YM_COUNTER_ID)
        if: ${{ secrets.YM_COUNTER_ID != '' }}
        run: |
          YM_SCRIPT='<script>(function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");ym(${{ secrets.YM_COUNTER_ID }},"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true});</script><noscript><div><img src="https://mc.yandex.ru/watch/${{ secrets.YM_COUNTER_ID }}" style="position:absolute;left:-9999px" alt=""/></div></noscript>'
          python3 -c "
          with open('pitch_v2.html','r',encoding='utf-8') as f:
              html = f.read()
          html = html.replace('<!-- YANDEX_METRIKA_PLACEHOLDER -->', '''$YM_SCRIPT''')
          with open('pitch_v2.html','w',encoding='utf-8') as f:
              f.write(html)
          "

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy
          cp pitch_v2.html _deploy/index.html
          cp -r assets _deploy/

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            _deploy/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/pitch-vkd/

      - name: Smoke test
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L https://pitch.vezdekakdoma.ru/ || echo "fail")
          echo "Pitch homepage HTTP: $STATUS"
