name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'screens/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Inject Yandex.Metrika (если задан YM_COUNTER_ID)
        env:
          YM_ID: ${{ secrets.YM_COUNTER_ID }}
        run: |
          if [ -z "$YM_ID" ]; then
            echo "YM_COUNTER_ID не задан — пропускаем Метрику"
            exit 0
          fi
          python3 <<EOF
          ym_id = "$YM_ID"
          ym = f'<script>(function(m,e,t,r,i,k,a){{m[i]=m[i]||function(){{(m[i].a=m[i].a||[]).push(arguments)}};m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){{if(document.scripts[j].src===r){{return;}}}}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)}})(window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");ym({ym_id},"init",{{clickmap:true,trackLinks:true,accurateTrackBounce:true,webvisor:true}});</script><noscript><div><img src="https://mc.yandex.ru/watch/{ym_id}" style="position:absolute;left:-9999px" alt=""/></div></noscript>'
          with open("pitch_v2.html","r",encoding="utf-8") as f:
              html = f.read()
          html = html.replace("<!-- YANDEX_METRIKA_PLACEHOLDER -->", ym)
          with open("pitch_v2.html","w",encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Prepare _site directory
        run: |
          mkdir -p _site
          cp pitch_v2.html _site/index.html
          cp -r assets _site/
          # 404 fallback
          cp pitch_v2.html _site/404.html
          touch _site/.nojekyll
          # Custom domain для GitHub Pages (если есть файл CNAME)
          [ -f CNAME ] && cp CNAME _site/CNAME || echo "(no CNAME — using github.io URL)"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test
        run: |
          sleep 5
          URL="${{ steps.deployment.outputs.page_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL" || echo "fail")
          echo "Pitch homepage HTTP: $STATUS at $URL"
