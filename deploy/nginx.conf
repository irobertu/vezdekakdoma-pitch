# /etc/nginx/sites-available/pitch.vezdekakdoma.ru
# Symlink: /etc/nginx/sites-enabled/pitch.vezdekakdoma.ru
# После: sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name pitch.vezdekakdoma.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pitch.vezdekakdoma.ru;

    root /var/www/pitch-vkd;
    index index.html;

    # SSL (заменит certbot)
    ssl_certificate /etc/letsencrypt/live/pitch.vezdekakdoma.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pitch.vezdekakdoma.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Кеширование статики
    location ~* \.(png|jpg|jpeg|webp|svg|ico|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML без кеша (чтобы изменения в деке тут же подхватывались)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/html text/javascript text/plain application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/pitch-vkd-access.log;
    error_log /var/log/nginx/pitch-vkd-error.log;
}
